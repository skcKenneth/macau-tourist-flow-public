name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tooling
        run: python -m pip install --upgrade pip ruff black

      - name: Ruff
        run: ruff check src tests

      - name: Black (check only)
        run: black --check src tests

  test:
    name: Unit tests (not slow)
    runs-on: ubuntu-latest
    defaults:
      run:
        # Required so the conda environment is activated for each step.
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: macau-tourist-flow
          auto-activate-base: false
          miniforge-version: latest

      - name: Install package (editable)
        run: pip install -e .

      - name: Run fast tests
        # The "not slow" set needs no network access or data downloads.
        run: pytest -q -m "not slow"
