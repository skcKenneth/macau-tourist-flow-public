experiment:
  id: EXP-03
  name: solver_validation
  seed: 42

graph:
  n_attraction_nodes: 3    # + 1 transit hub = 4 nodes total (star topology)
  edge_length_m: 200.0     # uniform edge length for symmetric test cases

solver:
  dt_hours: 0.08333        # 5-minute steps (= 5/60)
  T_hours: 14.0            # 08:00-22:00 (168 steps)
  epsilon: 0.1             # softmax temperature
  tol: 1.0e-6              # tight tolerance for validation
  max_iter: 200

arrivals:
  n_tourists: 1000.0       # tourist-units injected at transit hub
  peak_time_hours: 2.0     # peak at 10:00 (2h after 08:00)
  sigma_hours: 1.5

# Five parameter settings covering distinct MFG regimes.
# Success criterion: equilibrium distribution within stated tolerance of
# the expected value (Case 1 exact; others qualitative ordering).
cases:
  - id: "C1_uniform_alpha"
    description: "Uniform alpha, no congestion, no walk cost → uniform distribution (1/3 each attraction)"
    alpha: [0.0, 1.0, 1.0, 1.0]
    beta: 0.0
    gamma: 0.0
    expected: "uniform"
    tolerance: 0.01          # |sim − 1/3| < 0.01 for each attraction

  - id: "C2_skewed_alpha"
    description: "Skewed alpha, no congestion → ordering rho[1] > rho[2] > rho[3]"
    alpha: [0.0, 2.0, 1.0, 0.5]
    beta: 0.0
    gamma: 0.0
    expected: "ordered"

  - id: "C3_congestion"
    description: "Same skewed alpha + moderate congestion: top attraction loses share vs C2"
    alpha: [0.0, 2.0, 1.0, 0.5]
    beta: 0.5
    gamma: 0.0
    expected: "less_concentrated_than_C2"

  - id: "C4_walk_cost"
    description: "Equal alpha on two attractions, zero on the third; walk cost is uniform (K4, same edge lengths) -> attractions 1 and 2 receive more density, attraction 3 receives near-zero"
    alpha: [0.0, 1.0, 1.0, 0.0]
    beta: 0.0
    gamma: 5.0e-4
    expected: "two_equal_one_zero"
    near_zero_threshold: 0.10   # att3 fraction < this (option value from connectivity keeps it ~5%)

  - id: "C5_dominant_node"
    description: "Single very attractive node → near-total concentration at node 1"
    alpha: [0.0, 5.0, 0.0, 0.0]
    beta: 0.0
    gamma: 0.0
    expected: "concentrated"
    concentration_threshold: 0.80   # rho[1] / total_att > 0.80

output:
  base_dir: experiments
  figures:
    dpi: 300
    figsize_density: [14, 5]
    figsize_bar: [12, 5]
