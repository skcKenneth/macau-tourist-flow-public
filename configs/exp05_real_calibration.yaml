experiment:
  id: EXP-05
  name: real_calibration
  seed: 42

data:
  arrivals_path: data/processed/arrivals_monthly.parquet
  attractions_path: data/processed/attractions.parquet
  graph_cache_path: data/raw/osm

split:
  train_start: "2024-01"
  train_end: "2025-10"
  val_start: "2025-11"
  val_end: "2026-04"

graph:
  walk_speed_kmh: 5.0
  consolidate_tolerance_m: 15.0
  bbox:
    north: 22.220
    south: 22.183
    east: 113.550
    west: 113.525

snapping:
  max_dist_attraction_m: 100
  max_dist_transit_m: 300

simulation:
  dt_hours: 0.08333
  T_hours: 14.0
  peak_time_hours: 2.0
  sigma_hours: 1.5
  # Scale official daily arrivals to solver tourist-units while preserving
  # month-to-month demand and transit shares.
  population_scale: 0.001

solver:
  epsilon: 0.1
  tol: 5.0e-4
  max_iter: 80
  damping: 0.5

calibration:
  n_epochs: 25
  lr: 2.0e-3
  lr_decay: 0.995
  grad_clip: 1.0
  lambda_reg: 1.0e-4
  log_every: 5
  init_beta: 0.001
  init_gamma: 1.0e-5

hypothesis:
  validation_mae_threshold: 0.05
  max_attraction_error_threshold: 0.10

output:
  base_dir: experiments
  figures:
    dpi: 300
    figsize_bar: [12, 5]
    figsize_monthly: [10, 4]
