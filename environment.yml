name: macau-tourist-flow
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.11

  # PyTorch — from pytorch channel for correct CUDA-aware builds
  # For GPU: remove cpuonly and add pytorch-cuda=12.1
  - pytorch>=2.1
  - torchvision
  - cpuonly

  # Numerical core
  - numpy>=1.26
  - scipy>=1.11
  - pandas>=2.1

  # Geospatial stack — MUST come from conda-forge (pip GDAL breaks on geo libs)
  - geopandas>=0.14
  - osmnx>=1.9
  - shapely>=2.0
  - pyproj>=3.6
  - fiona>=1.9

  # Graph
  - networkx>=3.2

  # Visualization
  - matplotlib>=3.8
  - seaborn>=0.13
  - contextily>=1.5   # basemap tiles for map figures

  # Serialization
  - pyarrow>=14        # parquet read/write
  - pyyaml>=6.0        # config loading (yaml.safe_load)

  # Dev / code quality
  - ruff>=0.3
  - black>=24.0
  - pytest>=7.4
  - pytest-cov>=4.1

  # pip-only packages (installed inside the conda env)
  - pip
  - pip:
    - torchdiffeq>=0.2.3   # Neural ODE; no conda package exists
    - pdfplumber>=0.10     # DSEC PDF table parsing (src/utils/parse_dsec.py)
